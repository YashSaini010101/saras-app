<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password - Saras Calculator App</title>
  <link rel="stylesheet" href="css/app.css">
  <style>body { min-height: 100vh; }</style>
</head>
<body>
  <header class="app-header app-header--simple">
    <span class="app-title">Saras Calculator App</span>
  </header>

  <div class="auth-shell">
    <div class="auth-card">
      <h1>Reset password</h1>
      <p class="auth-lead">Use the same <strong>email or username</strong> as on the forgot-password step, paste the <strong>code</strong> from your email, then choose a new password.</p>

      <form id="resetForm">
        <label for="usernameOrEmail">Email or username</label>
        <input type="text" id="usernameOrEmail" name="usernameOrEmail" autocomplete="username" required>

        <label for="otp">Code from email</label>
        <input type="text" id="otp" name="otp" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="6 digits" required>

        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required minlength="6">

        <button type="submit" class="btn">Update password</button>
      </form>

      <div id="msg" class="msg" role="status"></div>

      <div class="auth-footer">
        <a href="forgot-password.html">Request a new code</a>
        <a href="login.html">← Back to log in</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      try {
        var id = sessionStorage.getItem("sarasResetIdentifier");
        if (id) document.getElementById("usernameOrEmail").value = id;
      } catch (e) {}
    });

    document.getElementById("resetForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      var msg = document.getElementById("msg");
      msg.textContent = "";
      msg.className = "msg";

      var usernameOrEmail = document.getElementById("usernameOrEmail").value.trim();
      var otp = document.getElementById("otp").value.trim();
      var newPassword = document.getElementById("newPassword").value;

      try {
        await SarasAPI.postResetPassword(usernameOrEmail, otp, newPassword);
        msg.className = "msg ok";
        msg.textContent = "Password updated! Redirecting…";
        setTimeout(function () {
          window.location.href = "login.html";
        }, 1200);
      } catch (err) {
        msg.className = "msg error";
        msg.textContent = err.message || "Reset failed.";
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password - Saras Calculator App</title>
  <link rel="stylesheet" href="css/app.css">
  <style>body { min-height: 100vh; }</style>
</head>
<body>
  <header class="app-header app-header--simple">
    <span class="app-title">Saras Calculator App</span>
  </header>

  <div class="auth-shell">
    <div class="auth-card">
      <h1>Forgot password</h1>
      <p class="auth-lead">Enter the <strong>email</strong> or <strong>username</strong> on your account. We’ll email a 6-digit code if we find a match.</p>

      <form id="forgotForm">
        <label for="usernameOrEmail">Email or username</label>
        <input type="text" id="usernameOrEmail" name="usernameOrEmail" autocomplete="username" required placeholder="you@email.com or username">

        <button type="submit" class="btn">Send code</button>
      </form>

      <div id="msg" class="msg" role="status"></div>

      <div class="auth-footer">
        <a href="reset-password.html">I already have a code → Reset password</a>
        <a href="login.html">← Back to log in</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById("forgotForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      var msg = document.getElementById("msg");
      msg.textContent = "";
      msg.className = "msg";

      var usernameOrEmail = document.getElementById("usernameOrEmail").value.trim();

      try {
        await SarasAPI.postForgotPassword(usernameOrEmail);
        msg.className = "msg ok";
        msg.textContent = "If an account matched, check your email (and spam). Then open Reset password and enter the code.";
        try {
          sessionStorage.setItem("sarasResetIdentifier", usernameOrEmail);
        } catch (err) {}
      } catch (err) {
        msg.className = "msg error";
        msg.textContent = err.message || "Request failed.";
      }
    });
  </script>
</body>
</html>
